<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lookbook - BlackSheep Culture</title>
  <meta name="description" content="BlackSheep Culture — rebellious streetwear for the resilient. Defy the flock. Live limitless." />
  <meta name="keywords" content="streetwear, BlackSheep Culture, resilient fashion, defy the flock, limitless" />
  <meta name="author" content="BlackSheep Culture" />
  <link rel="canonical" href="https://blacksheepculture.com/lookbook" />
  <link rel="icon" href="images/logo.png" type="image/png" />

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self';" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
    <header class="site-header">
      <div class="brand">
        <img src="images/logo.png" alt="BlackSheep Culture Logo" class="brand-logo" />
        <span class="brand-name">BlackSheep Culture</span>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="siteNav">☰</button>
      <nav class="site-nav" id="siteNav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="lookbook.html">Lookbook</a>
        <a href="video.html">Film</a>
        <a href="social.html">Community</a>
        <a href="shop.html" class="nav-cta">Shop Now</a>
      </nav>
    </header>

  <main>
    <section class="lookbook section" id="lookbook">
      <div class="section-head" data-animate>
        <p class="eyebrow">LOOKBOOK</p>
        <h2>Motion Frames</h2>
      </div>
      <div class="lookbook-slider" data-slider>
        <button class="slider-btn prev" data-prev aria-label="Previous slide">←</button>
        <div class="slides">
          <article class="slide active">
            <img src="images/lookbook1.jpg" alt="Model pose urban rooftop" loading="lazy" />
          </article>
          <article class="slide">
            <img src="images/lookbook2.jpg" alt="Model in alleyway with streetwear" loading="lazy" />
          </article>
          <article class="slide">
            <img src="images/lookbook3.jpg" alt="Street style portrait at night" loading="lazy" />
          </article>
        </div>
        <div class="slider-progress" aria-hidden="true">
          <div class="slider-progress__bar"></div>
        </div>
        <button class="slider-btn next" data-next aria-label="Next slide">→</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 BlackSheep Culture. Built for the resilient.</p>
    <div>
      <span>#DefyTheFlock</span>
      <span>#Limitless</span>
    </div>
  </footer>

  <button class="scroll-to-top" id="scrollToTop" aria-label="Scroll to top">↑</button>

  <script src="js/script.js"></script>
</body>
</html>
